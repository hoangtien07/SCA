# railway.toml — Multi-service deployment configuration
# Docs: https://docs.railway.app/reference/config-as-code
#
# This project deploys as THREE services on Railway:
#   1. api     — FastAPI backend (Dockerfile)
#   2. ui      — Streamlit frontend (Dockerfile.streamlit)
#   3. worker  — Celery async worker (Dockerfile) [Prompt #06]
#
# Setup on Railway:
#   1. Create a new project from this repo
#   2. Add three services, each pointing to the same repo
#   3. Set service names: "api", "ui", "worker"
#   4. Railway auto-detects the correct Dockerfile per service via [deploy.dockerfilePath]
#   5. Add shared env vars in the project settings (OPENAI_API_KEY, ANTHROPIC_API_KEY, etc.)
#   6. Add REDIS_URL pointing to your Railway Redis service
#
# Celery worker setup:
#   - In the "worker" service, override the start command to:
#     celery -A src.workers.celery_app worker --loglevel=info --concurrency=2
#   - This service does NOT need a health check endpoint

# ── API Service ──────────────────────────────────────────────────────────────
# Configure via Railway dashboard → Service "api" → Settings
# Or set RAILWAY_DOCKERFILE_PATH=Dockerfile in service env vars

[build]
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Worker Service (Celery) ───────────────────────────────────────────────────
# Create a separate Railway service pointing to this repo.
# Override start command to: celery -A src.workers.celery_app worker --loglevel=info
# Required env vars: OPENAI_API_KEY, ANTHROPIC_API_KEY, REDIS_URL
#
# [services.worker]
# startCommand = "celery -A src.workers.celery_app worker --loglevel=info --concurrency=2"
# dockerfilePath = "Dockerfile"
